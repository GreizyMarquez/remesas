<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Remesas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20243a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22d47a;
    --gold: #f5c842;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --red: #f25f5c;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 20px 0 24px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }

  .date-badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* PRECIOS DEL DÍA */
  .prices-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .inputs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .input-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .flag { font-size: 14px; }

  .input-group input {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .input-group input:focus {
    border-color: var(--accent);
  }

  .input-group input::placeholder {
    color: var(--border);
  }

  /* GANANCIA REAL */
  .dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .dash-stat {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .dash-stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .dash-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--green);
  }

  .dash-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dash-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dash-bar-label {
    width: 30px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }

  .dash-bar-track {
    flex: 1;
    background: var(--card);
    border-radius: 6px;
    height: 16px;
    overflow: hidden;
  }

  .dash-bar-fill {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    height: 100%;
    border-radius: 6px;
    transition: width 0.3s;
  }

  .dash-bar-value {
    width: 56px;
    text-align: right;
    font-size: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }

  /* AVISO BYBIT */
  .aviso-bybit {
    font-size: 11px;
    color: var(--gold);
    background: #261a0f;
    border: 1px solid #5c3d10;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.4;
  }

  /* ALERTA DE DESVIACIÓN DE PRECIO */
  .alerta-desviacion {
    font-size: 12px;
    color: #ffb4b2;
    background: #3a1414;
    border: 1.5px solid var(--red);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .alerta-desviacion b { color: var(--red); }

  /* BOTÓN CALCULAR */
  .btn-calc {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-calc:active { opacity: 0.85; }

  /* RESULTADOS */
  .results-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .result-card.highlight {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1a2240, #1a1d27);
  }

  .result-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .result-route {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .result-formula {
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .result-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .result-tag.pct-3 {
    background: #0f2d1a;
    color: var(--green);
    border-color: #1a5c35;
  }

  .result-tag.pct-10 {
    background: #261a0f;
    color: var(--gold);
    border-color: #5c3d10;
  }

  .result-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    text-align: right;
    white-space: nowrap;
  }

  .result-value.empty {
    color: var(--border);
    font-size: 14px;
  }

  /* STEPS */
  .steps-detail {
    background: var(--card);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
    display: none;
  }

  .steps-detail.show { display: block; }

  .steps-detail span.val { color: var(--accent); }

  /* TOGGLE DETAIL */
  .toggle-detail {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    margin-top: 4px;
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* COPY BTN */
  .copy-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .copy-btn:active { background: var(--accent); color: white; border-color: var(--accent); }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--green);
    color: #0a1a10;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SELECT (registro de remesas) */
  .input-group select {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .input-group select:focus { border-color: var(--accent); }

  .preview-box {
    background: var(--card);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .preview-box .val { color: var(--green); font-weight: 700; }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, var(--green), #189e5e);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: #06170e;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-add:active { opacity: 0.85; }

  .op-total {
    font-size: 11px;
    color: var(--muted);
    margin: 10px 0 2px;
  }

  .op-delete {
    background: none;
    border: none;
    color: var(--red);
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<header>
  <h1>💸 Calculadora de Remesas</h1>
  <p>Bs · PEN · COP</p>
  <div class="date-badge" id="dateBadge"></div>
  <div class="date-badge" id="syncBadge" style="margin-top:6px;"></div>
</header>

<div id="alertaDesviacion" class="alerta-desviacion" style="display:none;"></div>

<!-- GANANCIA REAL -->
<div class="prices-section" id="dashboardSection">
  <div class="section-label">📊 Ganancia real</div>
  <div class="dash-stats">
    <div class="dash-stat">
      <div class="dash-stat-label">Hoy</div>
      <div class="dash-stat-value" id="dashHoy">—</div>
    </div>
    <div class="dash-stat">
      <div class="dash-stat-label">Esta semana</div>
      <div class="dash-stat-value" id="dashSemana">—</div>
    </div>
    <div class="dash-stat">
      <div class="dash-stat-label">Este mes</div>
      <div class="dash-stat-value" id="dashMes">—</div>
    </div>
  </div>
  <div class="dash-bars" id="dashBars"></div>
</div>

<!-- PRECIOS BYBIT -->
<div class="prices-section">
  <div class="section-label">📊 Precios del día (Bybit)</div>
  <div id="avisoBybit" class="aviso-bybit" style="display:none;"></div>
  <div class="inputs-grid">
    <div class="input-group">
      <label><span class="flag">🇻🇪</span> Bs venta (USD→Bs)</label>
      <input type="number" id="bsVenta" placeholder="798" inputmode="decimal">
    </div>
    <div class="input-group">
      <label><span class="flag">🇻🇪</span> Bs compra (Bs→USD)</label>
      <input type="number" id="bsCompra" placeholder="751" inputmode="decimal">
    </div>
    <div class="input-group">
      <label><span class="flag">🇵🇪</span> PEN venta (USD→PEN)</label>
      <input type="number" id="penVenta" placeholder="3.43" inputmode="decimal">
    </div>
    <div class="input-group">
      <label><span class="flag">🇵🇪</span> PEN compra (PEN→USD)</label>
      <input type="number" id="penCompra" placeholder="3.41" inputmode="decimal">
    </div>
    <div class="input-group">
      <label><span class="flag">🇨🇴</span> COP venta (USD→COP)</label>
      <input type="number" id="copVenta" placeholder="3,527" inputmode="decimal">
    </div>
    <div class="input-group">
      <label><span class="flag">🇨🇴</span> COP compra (COP→USD)</label>
      <input type="number" id="copCompra" placeholder="3,426" inputmode="decimal">
    </div>
  </div>
</div>

<button class="btn-calc" onclick="calcular()">⚡ Calcular tasas</button>

<!-- RESULTADOS -->
<div class="results-grid" id="resultsGrid">
  <!-- se llena con JS -->
</div>

<div id="copyArea" style="display:none;">
  <hr class="divider">
  <button class="copy-btn" onclick="copiarTasas()">📋 Copiar tasas para WhatsApp</button>
</div>

<!-- REGISTRO DE REMESAS POR CLIENTE -->
<div class="prices-section" id="registroSection" style="display:none;">
  <div class="section-label">📒 Registro de remesas — hoy</div>

  <div class="input-group" style="margin-bottom:10px;">
    <label>Cliente</label>
    <input type="text" id="opCliente" placeholder="Nombre del cliente">
  </div>

  <div class="inputs-grid" style="margin-bottom:10px;">
    <div class="input-group">
      <label>Ruta</label>
      <select id="opRuta" onchange="previewOperacion()">
        <option value="penToBs">🇵🇪 PEN → Bs 🇻🇪</option>
        <option value="bsToPen">🇻🇪 Bs → PEN 🇵🇪</option>
        <option value="penToCop">🇵🇪 PEN → COP 🇨🇴</option>
        <option value="bsToCop">🇻🇪 Bs → COP 🇨🇴</option>
      </select>
    </div>
    <div class="input-group">
      <label>Monto enviado</label>
      <input type="number" id="opMonto" placeholder="0" inputmode="decimal" oninput="previewOperacion()">
    </div>
  </div>

  <div id="opPreview" class="preview-box" style="margin-bottom:10px;">Ingresa un monto para ver cuánto recibe</div>

  <button class="btn-add" onclick="agregarOperacion()">+ Agregar al registro</button>

  <div class="op-total" id="opTotalHoy"></div>

  <div id="opListaHoy" style="margin-top:8px;display:flex;flex-direction:column;gap:8px;"></div>

  <button class="toggle-detail" onclick="toggleHistorialOps()" id="btnHistorialOps" style="margin-top:10px;">▸ ver historial completo</button>
  <div id="opListaHistorial" style="margin-top:8px;display:none;flex-direction:column;gap:8px;"></div>
</div>

<!-- CIERRE DEL DÍA -->
<div class="prices-section" id="cierreSection" style="display:none;">
  <div class="section-label">🔒 Cierre del día</div>
  <div id="cierreHoyBox"></div>
  <button class="btn-add" style="background:linear-gradient(135deg,var(--gold),#c99a1e);color:#241a03;" onclick="cerrarDia()">🔒 Cerrar el día</button>
  <button class="toggle-detail" onclick="toggleHistorialCierres()" id="btnHistorialCierres" style="margin-top:10px;">▸ ver cierres anteriores</button>
  <div id="cierresHistorialBox" style="display:none;margin-top:8px;flex-direction:column;gap:8px;"></div>
</div>

<!-- HISTORIAL DE TASAS GUARDADAS -->
<div class="prices-section">
  <button class="toggle-detail" onclick="toggleHistorialTasas()" id="btnHistorialTasas">▸ ver historial de tasas guardadas</button>
  <div id="historialTasasBox" style="display:none;margin-top:10px;flex-direction:column;gap:8px;"></div>
</div>

<div class="toast" id="toast">✅ ¡Copiado!</div>

<script>
  // Fecha
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('es-ES', opts);

  let lastResults = null;

  function fmt(n, dec=3) {
    if (isNaN(n)) return '—';
    return n.toFixed(dec);
  }

  function calcular() {
    const bsV   = parseFloat(document.getElementById('bsVenta').value);
    const bsC   = parseFloat(document.getElementById('bsCompra').value);
    const penV  = parseFloat(document.getElementById('penVenta').value);
    const penC  = parseFloat(document.getElementById('penCompra').value);
    const copV  = parseFloat(document.getElementById('copVenta').value);
    const copC  = parseFloat(document.getElementById('copCompra').value);

    // Rutas y fórmulas
    // 1. PEN → Bs (de Perú a Venezuela): bsVenta / penCompra - 3%
    const penToBs_base = bsV / penC;
    const penToBs      = penToBs_base * 0.97;

    // 2. Bs → PEN (de Venezuela a Perú): PEN venta / Bs compra - 10%
    const bsToPen_base = penV / bsC;
    const bsToPen      = bsToPen_base * 0.90;

    // 3. PEN → COP: copVenta / penCompra - 10%
    const penToCop_base = copV / penC;
    const penToCop      = penToCop_base * 0.90;

    // 4. COP → PEN: penVenta / copCompra - 10%
    const copToPen_base = penV / copC;
    const copToPen      = copToPen_base * 0.90;

    // 5. Bs → COP: copVenta / bsCompra - 10%
    const bsToCop_base = copV / bsC;
    const bsToCop      = bsToCop_base * 0.90;

    // 6. COP → Bs: bsVenta / copCompra - 10%
    const copToBs_base = bsV / copC;
    const copToBs      = copToBs_base * 0.90;

    // 7. PEN → USD: 1/penCompra * 0.90
    const penToUsd_base = 1 / penC;
    const penToUsd      = penToUsd_base * 0.90;

    // 8. USD → PEN: penVenta * 0.97
    const usdToPen = penV * 0.97;

    lastResults = {
      penToBs, bsToPen, penToCop, copToPen, bsToCop, copToBs,
      bsV, bsC, penV, penC, copV, copC,
      penToBs_base, bsToPen_base, penToCop_base, copToPen_base, bsToCop_base, copToBs_base
    };

    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';

    const tasas = [
      {
        id: 'penToBs',
        route: '🇵🇪 PEN → Bs 🇻🇪',
        value: isNaN(penToBs) ? null : penToBs,
        pct: 3,
        dec: 2,
        formula: `${fmt(bsV,2)} ÷ ${fmt(penC,3)} = ${fmt(penToBs_base,3)} − 3%`,
        unit: 'Bs por Sol'
      },
      {
        id: 'bsToPen',
        route: '🇻🇪 Bs → PEN 🇵🇪',
        value: isNaN(bsToPen) ? null : bsToPen,
        pct: 10,
        dec: 5,
        formula: `${fmt(penV,3)} ÷ ${fmt(bsC,2)} = ${fmt(bsToPen_base,5)} − 10%`,
        unit: 'PEN por Bs'
      },
      {
        id: 'penToCop',
        route: '🇵🇪 PEN → COP 🇨🇴',
        value: isNaN(penToCop) ? null : penToCop,
        pct: 10,
        dec: 2,
        formula: `${fmt(copV,2)} ÷ ${fmt(penC,3)} = ${fmt(penToCop_base,3)} − 10%`,
        unit: 'COP por Sol'
      },
      {
        id: 'bsToCop',
        route: '🇻🇪 Bs → COP 🇨🇴',
        value: isNaN(bsToCop) ? null : bsToCop,
        pct: 10,
        dec: 3,
        formula: `${fmt(copV,2)} ÷ ${fmt(bsC,2)} = ${fmt(bsToCop_base,4)} − 10%`,
        unit: 'COP por Bs'
      },
    ];

    tasas.forEach(t => {
      const card = document.createElement('div');
      card.className = 'result-card' + (t.pct === 3 ? ' highlight' : '');

      const valStr = t.value !== null ? fmt(t.value, t.dec) : '—';
      const valClass = t.value !== null ? '' : 'empty';

      card.innerHTML = `
        <div class="result-info">
          <div class="result-route">${t.route}</div>
          <div class="result-formula">${t.formula}</div>
          <button class="toggle-detail" onclick="toggleDetail('${t.id}')">▸ ver pasos</button>
          <div class="steps-detail" id="steps-${t.id}">
            Paso 1: ${t.formula.split('=')[0].trim()} = <span class="val">${fmt(t.value !== null ? t.value/(1 - t.pct/100) : 0, t.dec+2)}</span><br>
            Paso 2: resultado × ${t.pct === 3 ? '0.97' : '0.90'} = <span class="val">${valStr}</span><br>
            Tasa final: <span class="val">${valStr} ${t.unit}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="result-value ${valClass}">${valStr}</div>
          <div class="result-tag ${t.pct === 3 ? 'pct-3' : 'pct-10'}">−${t.pct}%</div>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('copyArea').style.display = 'block';
    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Guardar tasas de hoy y habilitar el registro de remesas
    guardarTasasDeHoy({ bsV, bsC, penV, penC, copV, copC });
    ocultarAvisoBybit();
    document.getElementById('registroSection').style.display = 'block';
    document.getElementById('cierreSection').style.display = 'block';
    previewOperacion();
  }

  function toggleDetail(id) {

    const btn = el.previousElementSibling;
    const isOpen = el.classList.toggle('show');
    btn.textContent = isOpen ? '▾ ocultar pasos' : '▸ ver pasos';
  }

  function copiarTasas() {
    if (!lastResults) return;
    const r = lastResults;
    const d = new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});

    const lineas = [
      `📊 Tasas del día ${d}`,
      ``,
      `🇻🇪 Bs venta: ${r.bsV} | Bs compra: ${r.bsC}`,
      `🇵🇪 PEN venta: ${r.penV} | PEN compra: ${r.penC}`,
      `🇨🇴 COP venta: ${r.copV} | COP compra: ${r.copC}`,
      ``,
      `💱 MIS TASAS`,
      `🇵🇪→🇻🇪 PEN a Bs: ${fmt(r.penToBs,2)} Bs por Sol`,
      `🇻🇪→🇵🇪 Bs a PEN: ${fmt(r.bsToPen,5)} PEN por Bs`,
      `🇵🇪→🇨🇴 PEN a COP: ${fmt(r.penToCop,2)} COP por Sol`,
      `🇻🇪→🇨🇴 Bs a COP: ${fmt(r.bsToCop,3)} COP por Bs`,
    ].join('\n');

    navigator.clipboard.writeText(lineas).then(() => {
      showToast();
    }).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = lineas;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    if (msg) t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ======================================================================
  // PERSISTENCIA (localStorage) — historial de tasas + registro de remesas
  // Prefijo "calc_remesas_" para no chocar con otras apps en el mismo
  // dominio de GitHub Pages (ej. la app de Guayoyo).
  // ======================================================================
  const LS_TASAS = 'calc_remesas_tasas_historial';
  const LS_OPS   = 'calc_remesas_operaciones';
  const LS_CIERRES = 'calc_remesas_cierres';
  let referenciaBybit = null;

  // Pega aquí la URL de tu Web App de Apps Script (termina en /exec).
  // Mientras esté vacía, la app funciona solo con localStorage en este dispositivo.
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw7YyixnJxt3WLtEmhpekqTOZD7UVxF7wVouAfMcK_XAPltIp55rLk_8gHDf6oery4Fgg/exec';

  async function sincronizarDesdeNube() {
    if (!APPS_SCRIPT_URL) return false;
    try {
      const resp = await fetch(APPS_SCRIPT_URL);
      if (!resp.ok) throw new Error('respuesta no OK: ' + resp.status);
      const data = await resp.json();
      referenciaBybit = data.referencia || null;
      mostrarAlertaDesviacion(data.alerta || null);
      fusionar(LS_TASAS, data.tasas, 'fecha', 'tasa');
      fusionar(LS_OPS, data.operaciones, 'id', 'operacion');
      fusionar(LS_CIERRES, data.cierres, 'id', 'cierre');
      return true;
    } catch (e) {
      console.warn('No se pudo sincronizar desde la nube, uso datos locales', e);
      return false;
    }
  }

  // Combina lo que llega de la nube con lo que ya está en este dispositivo,
  // comparando cuál versión es más reciente (campo _ts). Si un registro
  // local es más nuevo que el de la nube (por ejemplo, la nube todavía no
  // terminó de procesar el guardado anterior), se conserva el local y se
  // reintenta subir — nunca se pierde el cambio más reciente ni se
  // duplica nada.
  function fusionar(lsKey, remotos, clave, tipo) {
    if (!Array.isArray(remotos)) return;
    const locales = cargarJSON(lsKey);
    const mapa = {};
    remotos.forEach(r => { mapa[String(r[clave])] = r; });
    const aRepush = [];
    locales.forEach(l => {
      const key = String(l[clave]);
      const remoto = mapa[key];
      if (!remoto || (l._ts || 0) > (remoto._ts || 0)) { mapa[key] = l; aRepush.push(l); }
    });
    guardarJSON(lsKey, Object.values(mapa));
    aRepush.forEach((item, i) => setTimeout(() => sincronizarEnNube(tipo, item), i * 250));
  }

  async function sincronizarEnNube(tipo, registro) {
    if (!APPS_SCRIPT_URL) return;
    try {
      const resp = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: 'guardar', tipo, registro }) });
      const data = await resp.json();
      mostrarEstadoSync(data.ok ? 'ok' : 'error');
    } catch (e) {
      console.warn('No se pudo guardar en la nube', tipo, e);
      mostrarEstadoSync('error');
    }
  }

  async function eliminarEnNube(tipo, id) {
    if (!APPS_SCRIPT_URL) return;
    try {
      const resp = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: 'eliminar', tipo, id }) });
      const data = await resp.json();
      mostrarEstadoSync(data.ok ? 'ok' : 'error');
    } catch (e) {
      console.warn('No se pudo eliminar en la nube', tipo, e);
      mostrarEstadoSync('error');
    }
  }

  function mostrarEstadoSync(estado) {
    const el = document.getElementById('syncBadge');
    if (!el) return;
    const estilos = {
      local:    { texto: '📴 Solo en este dispositivo', color: 'var(--muted)' },
      checking: { texto: '🔄 Sincronizando…', color: 'var(--muted)' },
      ok:       { texto: '☁️ Sincronizado con Google Sheets', color: 'var(--green)' },
      error:    { texto: '⚠️ Sin conexión con la nube — guardado local', color: 'var(--gold)' },
    };
    const s = estilos[estado] || estilos.local;
    el.textContent = s.texto;
    el.style.color = s.color;
  }

  function hoyStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function horaStr() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function fechaBonita(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    return dt.toLocaleDateString('es-ES', { weekday:'short', day:'2-digit', month:'short' });
  }

  function cargarJSON(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      console.warn('No se pudo leer', key, e);
      return [];
    }
  }

  function guardarJSON(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify(data));
      return true;
    } catch (e) {
      console.warn('No se pudo guardar', key, e);
      return false;
    }
  }

  // ---------- Historial de tasas ----------
  function guardarTasasDeHoy(rates) {
    const historial = cargarJSON(LS_TASAS);
    const idx = historial.findIndex(r => r.fecha === hoyStr());
    const registro = { fecha: hoyStr(), ...rates, _ts: Date.now() };
    if (idx >= 0) historial[idx] = registro; else historial.push(registro);
    guardarJSON(LS_TASAS, historial);
    renderHistorialTasas();
    sincronizarEnNube('tasa', registro);
  }

  function renderHistorialTasas() {
    const historial = cargarJSON(LS_TASAS).slice().sort((a,b) => b.fecha.localeCompare(a.fecha));
    const box = document.getElementById('historialTasasBox');
    const btn = document.getElementById('btnHistorialTasas');
    const abierto = btn.textContent.trim().startsWith('▾');
    btn.textContent = (abierto ? '▾' : '▸') + ` ver historial de tasas guardadas (${historial.length})`;

    if (historial.length === 0) {
      box.innerHTML = '<div style="font-size:11px;color:var(--muted)">Aún no hay tasas guardadas.</div>';
      return;
    }
    box.innerHTML = historial.map(r => `
      <div class="result-card" style="padding:10px 12px;">
        <div class="result-info">
          <div class="result-route">${fechaBonita(r.fecha)}${r.fecha === hoyStr() ? ' · HOY' : ''}</div>
          <div class="result-formula">🇻🇪 ${r.bsV} / ${r.bsC} · 🇵🇪 ${r.penV} / ${r.penC} · 🇨🇴 ${r.copV} / ${r.copC}</div>
        </div>
      </div>
    `).join('');
  }

  function toggleHistorialTasas() {
    const box = document.getElementById('historialTasasBox');
    const abrir = box.style.display !== 'flex';
    box.style.display = abrir ? 'flex' : 'none';
    renderHistorialTasas();
  }

  function mostrarAlertaDesviacion(alerta) {
    const box = document.getElementById('alertaDesviacion');
    if (!box) return;
    if (!alerta || !alerta.alerta || !alerta.detalles || !alerta.detalles.length) {
      box.style.display = 'none';
      return;
    }
    const lineas = alerta.detalles.map(d => {
      const flecha = d.pct > 0 ? '▲' : '▼';
      return `${d.nombre}: ${fmt(d.hoyVal,3)} → ${fmt(d.actualVal,3)} (${flecha} ${Math.abs(d.pct).toFixed(1)}%)`;
    }).join('<br>');
    box.innerHTML = `<b>⚠️ El precio en Bybit se movió desde tu tasa de hoy</b><br>${lineas}<br>Revisa si te conviene seguir con la misma tasa.`;
    box.style.display = 'block';
  }

  function mostrarAvisoBybit(conError) {
    const el = document.getElementById('avisoBybit');
    if (!el) return;
    el.textContent = conError
      ? '⚠️ No se pudo actualizar desde Bybit — se sugiere el último precio conocido. Revisa antes de calcular.'
      : '🔄 Tasa sugerida por Bybit — revisa y ajusta si hace falta antes de calcular.';
    el.style.display = 'block';
  }

  function ocultarAvisoBybit() {
    const el = document.getElementById('avisoBybit');
    if (el) el.style.display = 'none';
  }

  function prellenarTasas() {
    const historial = cargarJSON(LS_TASAS).slice().sort((a,b) => b.fecha.localeCompare(a.fecha));
    const yaCalculoHoy = historial.length > 0 && historial[0].fecha === hoyStr();

    // Si aún no calculaste hoy, sugiere la tasa de Bybit (editable) en vez de dejar todo en blanco
    if (!yaCalculoHoy && referenciaBybit && referenciaBybit.bsV) {
      document.getElementById('bsVenta').value   = referenciaBybit.bsV;
      document.getElementById('bsCompra').value  = referenciaBybit.bsC;
      document.getElementById('penVenta').value  = referenciaBybit.penV;
      document.getElementById('penCompra').value = referenciaBybit.penC;
      document.getElementById('copVenta').value  = referenciaBybit.copV;
      document.getElementById('copCompra').value = referenciaBybit.copC;
      mostrarAvisoBybit(!!referenciaBybit.error);
      return;
    }

    // Si ya calculaste hoy, restaura esa misma tasa (se mantiene todo el día)
    if (historial.length === 0) return;
    const ultimo = historial[0];
    document.getElementById('bsVenta').value   = ultimo.bsV;
    document.getElementById('bsCompra').value  = ultimo.bsC;
    document.getElementById('penVenta').value  = ultimo.penV;
    document.getElementById('penCompra').value = ultimo.penC;
    document.getElementById('copVenta').value  = ultimo.copV;
    document.getElementById('copCompra').value = ultimo.copC;
  }

  // ---------- Registro de remesas por cliente ----------
  const rutaInfo = {
    penToBs:  { label: '🇵🇪 PEN → Bs 🇻🇪',  dec: 2, compraKey: 'penC', fee: 0.03 },
    bsToPen:  { label: '🇻🇪 Bs → PEN 🇵🇪',  dec: 5, compraKey: 'bsC',  fee: 0.10 },
    penToCop: { label: '🇵🇪 PEN → COP 🇨🇴', dec: 2, compraKey: 'penC', fee: 0.10 },
    bsToCop:  { label: '🇻🇪 Bs → COP 🇨🇴',  dec: 3, compraKey: 'bsC',  fee: 0.10 },
  };

  // Ganancia en USDT: el monto que entra, valorizado en USDT a la tasa de
  // compra del día, multiplicado por el % que te quedas en esa ruta (3% o 10%).
  function calcularGananciaUsdt(ruta, monto) {
    const info = rutaInfo[ruta];
    const compra = lastResults[info.compraKey];
    if (!compra) return 0;
    return (monto / compra) * info.fee;
  }

  function gananciaTotal(ops) {
    return ops.reduce((sum, o) => sum + (o.usdt || 0), 0);
  }

  function agruparPorFecha(ops) {
    const grupos = {};
    ops.forEach(o => {
      if (!grupos[o.fecha]) grupos[o.fecha] = [];
      grupos[o.fecha].push(o);
    });
    return Object.keys(grupos).sort((a, b) => b.localeCompare(a)).map(fecha => ({
      fecha,
      ops: grupos[fecha].sort((a, b) => b.id - a.id)
    }));
  }

  function previewOperacion() {
    const preview = document.getElementById('opPreview');
    if (!preview) return;
    if (!lastResults) { preview.innerHTML = 'Primero calcula las tasas de hoy ↑'; return; }
    const ruta = document.getElementById('opRuta').value;
    const monto = parseFloat(document.getElementById('opMonto').value);
    const info = rutaInfo[ruta];
    const tasa = lastResults[ruta];
    if (isNaN(monto) || monto <= 0) { preview.innerHTML = 'Ingresa un monto para ver cuánto recibe'; return; }
    const resultado = monto * tasa;
    const usdt = calcularGananciaUsdt(ruta, monto);
    preview.innerHTML = `Recibe: <span class="val">${fmt(resultado, info.dec)}</span> · tú ganas ≈ <span class="val">${fmt(usdt, 2)} USDT</span>`;
  }

  function agregarOperacion() {
    if (!lastResults) { alert('Primero calcula las tasas de hoy.'); return; }
    const clienteInput = document.getElementById('opCliente');
    const montoInput = document.getElementById('opMonto');
    const cliente = clienteInput.value.trim();
    const ruta = document.getElementById('opRuta').value;
    const monto = parseFloat(montoInput.value);

    if (!cliente) { alert('Escribe el nombre del cliente.'); return; }
    if (isNaN(monto) || monto <= 0) { alert('Ingresa un monto válido.'); return; }

    const tasa = lastResults[ruta];
    const resultado = monto * tasa;
    const usdt = calcularGananciaUsdt(ruta, monto);

    const ops = cargarJSON(LS_OPS);
    const nuevaOperacion = {
      id: Date.now(),
      fecha: hoyStr(),
      hora: horaStr(),
      cliente, ruta, monto, resultado, tasa, usdt, _ts: Date.now()
    };
    ops.push(nuevaOperacion);
    guardarJSON(LS_OPS, ops);
    sincronizarEnNube('operacion', nuevaOperacion);

    clienteInput.value = '';
    montoInput.value = '';
    previewOperacion();
    renderOperaciones();
  }

  function eliminarOperacion(id) {
    let ops = cargarJSON(LS_OPS);
    ops = ops.filter(o => o.id !== id);
    guardarJSON(LS_OPS, ops);
    renderOperaciones();
    eliminarEnNube('operacion', id);
  }

  function tarjetaOperacion(o) {
    const info = rutaInfo[o.ruta] || { label: o.ruta, dec: 2 };
    return `
      <div class="result-card" style="padding:10px 12px;">
        <div class="result-info">
          <div class="result-route">${o.cliente}</div>
          <div class="result-formula">${info.label} · ${o.hora}</div>
          <button class="op-delete" onclick="eliminarOperacion(${o.id})">eliminar</button>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <div class="result-value" style="font-size:14px;">${fmt(o.monto,2)} → ${fmt(o.resultado, info.dec)}</div>
          <div style="font-size:10px;color:var(--green);font-family:'JetBrains Mono',monospace;">+${fmt(o.usdt||0,2)} USDT</div>
        </div>
      </div>
    `;
  }

  function renderDashboardGanancias() {
    const box = document.getElementById('dashBars');
    const elHoy = document.getElementById('dashHoy');
    const elSemana = document.getElementById('dashSemana');
    const elMes = document.getElementById('dashMes');
    if (!box) return;

    const ops = cargarJSON(LS_OPS);
    const hoy = hoyStr();
    const diasCorta = ['dom','lun','mar','mié','jue','vie','sáb'];

    const dias = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const fecha = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      dias.push({ fecha, nombre: diasCorta[d.getDay()], ganancia: gananciaTotal(ops.filter(o => o.fecha === fecha)) });
    }

    const ganHoy = dias[dias.length - 1].ganancia;
    const ganSemana = dias.reduce((s, d) => s + d.ganancia, 0);
    const inicioMes = hoy.slice(0, 8) + '01';
    const ganMes = gananciaTotal(ops.filter(o => o.fecha >= inicioMes && o.fecha <= hoy));

    elHoy.innerHTML    = `${fmt(ganHoy, 2)}<span style="font-size:9px;color:var(--muted);font-weight:600;"> USDT</span>`;
    elSemana.innerHTML = `${fmt(ganSemana, 2)}<span style="font-size:9px;color:var(--muted);font-weight:600;"> USDT</span>`;
    elMes.innerHTML    = `${fmt(ganMes, 2)}<span style="font-size:9px;color:var(--muted);font-weight:600;"> USDT</span>`;

    const maxGan = Math.max(...dias.map(d => d.ganancia), 0.01);
    box.innerHTML = dias.map(d => {
      const pct = d.ganancia > 0 ? Math.max((d.ganancia / maxGan) * 100, 4) : 0;
      return `
        <div class="dash-bar-row">
          <div class="dash-bar-label">${d.nombre}</div>
          <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%"></div></div>
          <div class="dash-bar-value">${fmt(d.ganancia, 2)}</div>
        </div>`;
    }).join('');
  }

  function renderOperaciones() {
    const ops = cargarJSON(LS_OPS);

    const hoy = ops.filter(o => o.fecha === hoyStr()).sort((a,b) => b.id - a.id);
    const listaHoy = document.getElementById('opListaHoy');
    listaHoy.innerHTML = hoy.length
      ? hoy.map(tarjetaOperacion).join('')
      : '<div style="font-size:11px;color:var(--muted)">Aún no registras remesas hoy.</div>';

    const totalHoy = document.getElementById('opTotalHoy');
    if (hoy.length) {
      totalHoy.innerHTML = `${hoy.length} remesa${hoy.length === 1 ? '' : 's'} hoy · <span style="color:var(--green);font-weight:700">≈ ${fmt(gananciaTotal(hoy),2)} USDT</span> en ganancias`;
    } else {
      totalHoy.textContent = '';
    }

    const historial = ops.filter(o => o.fecha !== hoyStr());
    const grupos = agruparPorFecha(historial);
    const btn = document.getElementById('btnHistorialOps');
    const boxHist = document.getElementById('opListaHistorial');
    const abierto = btn.textContent.trim().startsWith('▾');
    btn.textContent = (abierto ? '▾' : '▸') + ` ver historial completo (${historial.length})`;
    boxHist.innerHTML = grupos.length
      ? grupos.map(g => `
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;margin:2px 0 6px;">
              ${fechaBonita(g.fecha)} · ${g.ops.length} remesa${g.ops.length === 1 ? '' : 's'} · <span style="color:var(--green)">≈ ${fmt(gananciaTotal(g.ops),2)} USDT</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">
              ${g.ops.map(tarjetaOperacion).join('')}
            </div>
          </div>
        `).join('')
      : '<div style="font-size:11px;color:var(--muted)">Sin remesas de días anteriores.</div>';
    renderCierreDia();
    renderDashboardGanancias();
  }

  function toggleHistorialOps() {
    const box = document.getElementById('opListaHistorial');
    const abrir = box.style.display !== 'flex';
    box.style.display = abrir ? 'flex' : 'none';
    renderOperaciones();
  }

  // ======================================================================
  // CIERRE DEL DÍA
  // ======================================================================
  function pendientesDeCierre() {
    const hoy = hoyStr();
    const cierresHoy = cargarJSON(LS_CIERRES).filter(c => c.fecha === hoy).sort((a,b) => b.horaCierre.localeCompare(a.horaCierre));
    const ultimaHora = cierresHoy.length ? cierresHoy[0].horaCierre : null;
    return cargarJSON(LS_OPS).filter(o => o.fecha === hoy && (!ultimaHora || o.hora > ultimaHora));
  }

  function renderCierreDia() {
    const pendientes = pendientesDeCierre();
    const totalUsdt = gananciaTotal(pendientes);
    const box = document.getElementById('cierreHoyBox');
    if (!box) return;
    box.innerHTML = `<div style="font-size:13px;margin-bottom:10px;">Pendientes de cierre: <b>${pendientes.length}</b> remesa${pendientes.length === 1 ? '' : 's'} · <b style="color:var(--green)">≈ ${fmt(totalUsdt,2)} USDT</b></div>`;
    renderHistorialCierres();
  }

  function cerrarDia() {
    const pendientes = pendientesDeCierre();
    if (!pendientes.length) { alert('No hay remesas pendientes de cierre.'); return; }
    const totalUsdt = gananciaTotal(pendientes);
    if (!confirm(`Cerrar el día con ${pendientes.length} remesa(s) — tu ganancia fue ≈ ${fmt(totalUsdt,2)} USDT. ¿Confirmar?`)) return;

    const cierre = {
      id: Date.now(),
      fecha: hoyStr(),
      horaCierre: horaStr(),
      numRemesas: pendientes.length,
      totalUsdt,
      _ts: Date.now()
    };
    const cierres = cargarJSON(LS_CIERRES);
    cierres.push(cierre);
    guardarJSON(LS_CIERRES, cierres);
    sincronizarEnNube('cierre', cierre);
    renderCierreDia();
    showToast(`🔒 Día cerrado: tu ganancia fue ≈ ${fmt(totalUsdt,2)} USDT`);
  }

  function toggleHistorialCierres() {
    const box = document.getElementById('cierresHistorialBox');
    const abrir = box.style.display !== 'flex';
    box.style.display = abrir ? 'flex' : 'none';
    renderHistorialCierres();
  }

  function renderHistorialCierres() {
    const cierres = cargarJSON(LS_CIERRES).slice().sort((a,b) => (b.fecha+b.horaCierre).localeCompare(a.fecha+a.horaCierre));
    const btn = document.getElementById('btnHistorialCierres');
    if (!btn) return;
    const abierto = btn.textContent.trim().startsWith('▾');
    btn.textContent = (abierto ? '▾' : '▸') + ` ver cierres anteriores (${cierres.length})`;
    const box = document.getElementById('cierresHistorialBox');
    box.innerHTML = cierres.length ? cierres.map(c => `
      <div class="result-card" style="padding:10px 12px;">
        <div class="result-info">
          <div class="result-route">${fechaBonita(c.fecha)}${c.fecha === hoyStr() ? ' · HOY' : ''} · ${c.horaCierre}</div>
          <div class="result-formula">${c.numRemesas} remesa${c.numRemesas === 1 ? '' : 's'}</div>
        </div>
        <div style="font-weight:700;color:var(--green);">≈ ${fmt(c.totalUsdt,2)} USDT</div>
      </div>
    `).join('') : '<div style="font-size:11px;color:var(--muted)">Sin cierres todavía.</div>';
  }

  // ---------- Inicio ----------
  document.addEventListener('DOMContentLoaded', async function () {
    mostrarEstadoSync(APPS_SCRIPT_URL ? 'checking' : 'local');
    const sincronizado = await sincronizarDesdeNube();
    if (APPS_SCRIPT_URL) mostrarEstadoSync(sincronizado ? 'ok' : 'error');

    prellenarTasas();
    renderOperaciones();
    renderCierreDia();
    const historial = cargarJSON(LS_TASAS);
    const yaCalculoHoy = historial.some(r => r.fecha === hoyStr());
    if (yaCalculoHoy) {
      calcular();
    } else {
      renderHistorialTasas();
    }

    // Revisa cada 5 minutos si el precio de Bybit se movió mucho de tu tasa de hoy
    // (solo mientras esta pestaña esté abierta — para avisos aunque la app esté
    // cerrada, revisa tu correo: el backend también manda un aviso por email).
    if (APPS_SCRIPT_URL) {
      setInterval(() => { sincronizarDesdeNube(); }, 5 * 60 * 1000);
    }
  });
</script>
</body>
</html>
